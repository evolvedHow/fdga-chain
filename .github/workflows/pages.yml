name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy frontend to docs
        # Keep docs/index.html in sync with frontend/index.html
        run: |
          cp frontend/index.html docs/index.html
          # Copy state pipeline data (boundaries, elections, metrics, cycles) into docs/
          # so GitHub Pages can serve them when IS_STATIC=true (no backend)
          if [ -d data/states ]; then
            mkdir -p docs/data/states
            cp -r data/states/* docs/data/states/
          fi

      - name: Inject Mapbox token
        # Replaces the placeholder line with the real token from GitHub Secrets.
        # The token ends up in the deployed HTML (required — Mapbox GL JS is client-side).
        # Restrict the token to your GitHub Pages domain in your Mapbox account for safety.
        env:
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
        run: |
          if [ -n "$MAPBOX_TOKEN" ]; then
            sed -i "s|window.MAPBOX_TOKEN = null; // __MAPBOX_TOKEN_INJECT__.*|window.MAPBOX_TOKEN = '${MAPBOX_TOKEN}'; // injected by CI|g" docs/index.html
            echo "Mapbox token injected into docs/index.html"
          else
            echo "MAPBOX_TOKEN secret not set — History tab will prompt for token"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
